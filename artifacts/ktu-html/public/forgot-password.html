<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — KTU Student Portal</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <script src="js/main.js" defer></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      z-index: 10;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
    .icon-header {
      width: 48px;
      height: 48px;
      background: rgba(59, 130, 246, 0.1);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-blue);
      margin-bottom: 16px;
    }
    .success-msg {
      display: none;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: var(--accent-emerald);
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  
  <div class="login-container fade-in">
    <div class="card">
      <a href="../index.html" class="back-link">
        <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Back to Login
      </a>
      
      <div class="icon-header">
        <i data-lucide="key" style="width: 24px; height: 24px;"></i>
      </div>
      
      <h1 class="font-display" style="font-size: 24px; margin-bottom: 8px;">Reset Password</h1>
      <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">
        Enter your university email address and we'll send you a link to reset your password.
      </p>

      <form id="resetForm" onsubmit="event.preventDefault(); document.getElementById('successMsg').style.display='block';">
        <div class="input-group">
          <i data-lucide="mail"></i>
          <input type="email" placeholder="University Email" required>
        </div>
        
        <button type="submit" class="btn">Send Reset Link</button>
      </form>
      
      <div id="successMsg" class="success-msg">
        Reset link sent to your email successfully.
      </div>
    </div>
  </div>
</body>
</html>
