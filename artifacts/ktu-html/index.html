<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — KTU Student Portal</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <script src="js/main.js" defer></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      z-index: 10;
    }
    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      text-align: center;
    }
    .logo-box-large {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(6,182,212,0.2));
      border: 1px solid var(--accent-blue);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(59,130,246,0.2);
    }
    .logo-box-large span {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--accent-blue);
      text-shadow: 0 0 10px rgba(59,130,246,0.5);
    }
    .login-heading {
      font-size: 24px;
      margin-bottom: 8px;
    }
    .login-sub {
      color: var(--text-muted);
      font-size: 14px;
    }
    .auth-links {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
      font-size: 13px;
    }
    .form-note {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  
  <div class="login-container fade-in">
    <div class="card">
      <div class="logo-container">
        <div class="logo-box-large">
          <span>KTU</span>
        </div>
        <h1 class="login-heading">Sign In to Mission Control</h1>
        <p class="login-sub">Kerala Technological University Portal</p>
      </div>

      <form id="loginForm" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
        <div class="input-group">
          <i data-lucide="mail"></i>
          <input type="text" placeholder="University Email or Roll No" required>
        </div>
        
        <div class="input-group">
          <i data-lucide="lock"></i>
          <input type="password" placeholder="Password" required>
        </div>

        <div class="auth-links">
          <label style="display:flex; align-items:center; gap:8px; cursor:pointer; color:var(--text-secondary)">
            <input type="checkbox" style="accent-color: var(--accent-blue);"> Remember me
          </label>
          <a href="forgot-password.html">Forgot password?</a>
        </div>

        <button type="submit" class="btn">
          Sign In to Mission Control <i data-lucide="arrow-right" style="width: 16px; height: 16px;"></i>
        </button>
      </form>

      <p class="form-note">
        <i data-lucide="shield-alert" style="width: 12px; height: 12px; display: inline-block; vertical-align: middle;"></i> 
        Only authorized students can access this portal.
      </p>
    </div>
  </div>
</body>
</html>
